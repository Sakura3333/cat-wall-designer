  <g filter="url(#shadow)">
    <rect x="526" y="594" width="208" height="121" rx="18" class="wood"/>
    <path d="M548 674 H710" stroke="#fff0d8" stroke-width="5" opacity=".55"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="222" y="413" width="186" height="364" rx="20" fill="#ffd7c9" stroke="#965f50" stroke-width="2"/>
    <path d="M255 455 H375 M255 496 H375 M255 537 H375 M255 578 H375 M255 619 H375 M255 660 H375 M255 701 H375" stroke="#b97861" stroke-width="10" stroke-linecap="round"/>
    <path d="M239 430 C277 404 356 403 392 430" fill="none" stroke="#fff3eb" stroke-width="7" opacity=".65"/>
  </g>

  <g filter="url(#softShadow)">
