<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">暖色可爱猫墙渲染图</title>
  <desc id="desc">暖色调、可爱风格的猫墙效果图，包含木质平台、圆润猫窝、猫屋、剑麻柱、吊床、绳桥和软垫。</desc>
  <defs>
    <linearGradient id="wallGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff6e8"/>
      <stop offset=".58" stop-color="#fffaf3"/>
      <stop offset="1" stop-color="#ffe9dc"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#efd3ad"/>
      <stop offset="1" stop-color="#c99662"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6c987"/>
      <stop offset=".55" stop-color="#dda35d"/>
      <stop offset="1" stop-color="#b9773d"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe4df"/>
      <stop offset="1" stop-color="#f4a99c"/>
    </linearGradient>
    <pattern id="grain" patternUnits="userSpaceOnUse" width="100" height="26">
      <path d="M0 13 C20 4 36 22 58 12 C75 5 86 10 100 15" stroke="#9b612f" stroke-width="1.5" opacity=".22" fill="none"/>
      <path d="M0 23 C30 15 48 28 77 20 C87 17 94 20 100 22" stroke="#fff0d8" stroke-width="1.2" opacity=".35" fill="none"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#8b5a32" flood-opacity=".22"/>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#8b5a32" flood-opacity=".15"/>
    </filter>
    <style>
      .label { font-family: "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #51392d; font-size: 28px; font-weight: 800; }
      .small { font-family: "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; fill: #6e4e3d; font-size: 18px; }
      .wall { fill: url(#wallGlow); }
      .wood { fill: url(#wood); stroke: #8a5a35; stroke-width: 2; }
      .woodgrain { fill: url(#grain); opacity: .75; }
      .cushion { fill: url(#pink); stroke: #b87568; stroke-width: 2; }
      .sisal { fill: #c89255; stroke: #7a5234; stroke-width: 2; }
      .rope { stroke: #b77a43; stroke-width: 7; stroke-linecap: round; }
      .cream { fill: #fff8ed; stroke: #8a5a35; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1600" height="1100" fill="#fff3e6"/>
  <rect x="98" y="96" width="1404" height="838" rx="36" class="wall"/>
  <rect x="98" y="852" width="1404" height="180" fill="url(#floor)"/>
  <path d="M98 852 H1502" stroke="#b98555" stroke-width="4"/>

  <text x="132" y="160" class="label">暖色可爱猫墙效果图</text>
  <text x="134" y="194" class="small">奶油墙面、浅木色平台、珊瑚粉软垫；适合客厅、阳台封窗区或猫房主墙。</text>

