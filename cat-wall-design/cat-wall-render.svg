    <path d="M690 500 L762 464 M690 535 L762 499 M690 570 L762 534 M690 605 L762 569 M690 640 L762 604 M690 675 L762 639 M690 710 L762 674 M690 745 L762 709 M690 780 L762 744" stroke="#8a5a35" stroke-width="5" opacity=".5"/>
    <circle cx="726" cy="470" r="45" class="wood"/>
