    <rect x="1087" y="607" width="264" height="171" rx="78" class="cream"/>
    <circle cx="1172" cy="692" r="47" class="cushion"/>
    <circle cx="1269" cy="692" r="28" class="cushion"/>
    <circle cx="1160" cy="642" r="16" fill="#f7b1a1"/>
    <circle cx="1205" cy="628" r="16" fill="#f7b1a1"/>
    <circle cx="1248" cy="633" r="16" fill="#f7b1a1"/>
    <path d="M1172 704 q49 34 97 0" fill="none" stroke="#9b6557" stroke-width="6" stroke-linecap="round"/>
  </g>

  <g filter="url(#shadow)">
