    <path d="M602 351 L1026 351 M622 382 L1006 382" class="rope"/>
    <path d="M640 329 V421 M704 316 V430 M768 310 V434 M832 308 V435 M896 310 V434 M960 318 V429" stroke="#8f5f37" stroke-width="5" stroke-linecap="round"/>
    <path d="M594 333 C725 292 907 292 1036 333" fill="none" stroke="#fff0ce" stroke-width="5" opacity=".65"/>
  </g>

